<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS_AI | hanzX Official</title>
    <style>
        :root { --bg: #050103; --panel: #0f0208; --neon: #00ffcc; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Share Tech Mono', monospace; margin: 0; overflow: hidden; }
        
        /* Background Glow Effect */
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #00ffcc1a 0%, transparent 70%); z-index: -1; }

        .container { display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; border-left: 1px solid var(--neon); border-right: 1px solid var(--neon); background: var(--panel); }

        header { padding: 20px; text-align: center; border-bottom: 1px solid var(--neon); box-shadow: 0 0 15px #00ffcc4d; }
        header h1 { margin: 0; font-size: 1.5rem; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        
        .msg { max-width: 80%; padding: 12px; border-radius: 10px; font-size: 0.9rem; line-height: 1.4; position: relative; }
        .bot { align-self: flex-start; background: #1a1a1a; border: 1px solid var(--neon); box-shadow: 0 0 8px #00ffcc33; color: var(--neon); }
        .user { align-self: flex-end; background: var(--neon); color: #000; font-weight: bold; }

        .input-area { padding: 20px; display: flex; gap: 10px; background: #000; border-top: 1px solid var(--neon); }
        input { flex: 1; background: #111; border: 1px solid var(--neon); padding: 12px; color: var(--neon); border-radius: 5px; outline: none; }
        button { background: var(--neon); border: none; padding: 0 20px; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { box-shadow: 0 0 15px var(--neon); }

        /* Status Bar */
        .status { font-size: 0.6rem; text-align: center; color: #555; padding: 5px; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-glow"></div>
    <div class="container">
        <header>
            <h1>NEXUS_AI</h1>
            <div style="font-size: 0.6rem; color: #00ffcc;">[ KERNEL GPT v4.0 ACTIVE ]</div>
        </header>

        <div id="chat-box">
            <div class="msg bot">Initializing Nexus Kernel...<br>System Ready. Apa perintahmu, hanzX? 😈</div>
        </div>

        <div class="status" id="status-text">SIGNAL: ENCRYPTED | LATENCY: 24ms</div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type command here..." onkeypress="handleKey(event)">
            <button onclick="sendMsg()">SEND</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        function sendMsg() {
            const text = userInput.value.trim();
            if (!text) return;

            // User Message
            appendMsg(text, 'user');
            userInput.value = '';

            // Bot Response Simulation
            document.getElementById('status-text').innerText = "SIGNAL: PROCESSING...";
            setTimeout(() => {
                const response = getNexusResponse(text);
                appendMsg(response, 'bot');
                document.getElementById('status-text').innerText = "SIGNAL: ENCRYPTED | LATENCY: " + Math.floor(Math.random() * 50) + "ms";
            }, 1000);
        }

        function appendMsg(text, type) {
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleKey(e) { if (e.key === 'Enter') sendMsg(); }

        function getNexusResponse(input) {
            input = input.toLowerCase();
            if (input.includes("siapa")) return "Gue **NEXUS_AI**, asisten pribadi lu yang paling gahar mpray! 😈🚀";
            if (input.includes("hanzx")) return "hanzX (Rehan) adalah **The Father of Nexus**. Developer & Modder Android nomor satu! 🔥";
            if (input.includes("halo") || input.includes("hi")) return "Halo mpray! Sistem siap ngebom, mau perintah apa hari ini? 💀";
            if (input.includes("bug") || input.includes("crash")) return "Fitur **Crasher** terdeteksi. Silakan balik ke panel utama buat nembak target cok! 🚀";
            
            // Default response ala Nexus GPT
            const random = [
                "Command accepted. Processing data... 😈",
                "Gue denger lu mpray, tapi itu perintah rahasia cok! 🚀",
                "Data terenkripsi. Nexus sedang memindai jaringan... 🔥",
                "Anjay mabar! Lu ngetik apaan dah mpray? Kocag! 💀"
            ];
            return random[Math.floor(Math.random() * random.length)];
        }
    </script>
</body>
</html>
